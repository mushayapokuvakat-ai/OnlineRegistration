<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - CourseReg</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="bg-dark text-light">
    <div class="bg-animation"></div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">CourseReg</a>
            <div class="d-flex align-items-center gap-3">
                <span class="text-light d-none d-md-block" id="navUser"></span>
                <button class="btn btn-sm btn-outline-danger" onclick="Auth.logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <!-- Profile & Stats -->
        <div class="row mb-5">
            <div class="col-md-4 mb-4 mb-md-0">
                <div
                    class="glass-card h-100 d-flex flex-column justify-content-center align-items-center text-center p-4">
                    <div class="avatar-circle mb-3">👨‍🎓</div>
                    <h4 id="studentName">Student Name</h4>
                    <p class="text-secondary mb-2" id="studentEmail">student@email.com</p>
                    <span class="badge-role badge-student">Student Account</span>
                </div>
            </div>
            <div class="col-md-8">
                <div class="glass-card h-100 p-4">
                    <h5 class="mb-4">Enrollment Status</h5>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <h3 id="enrolledCount">0</h3>
                            <p>Courses Enrolled</p>
                        </div>
                        <div class="stat-item">
                            <h3 id="creditsCount">0</h3>
                            <p>Credits (Est.)</p>
                        </div>
                        <div class="stat-item">
                            <h3 id="slotsRemaining">5</h3>
                            <p>Slots Remaining</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Enrolled Courses -->
        <div class="mb-5 fade-in">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3>My Registered Courses</h3>
            </div>
            <div class="glass-card p-0 overflow-hidden">
                <div class="table-responsive">
                    <table class="table table-custom mb-0" id="enrolledTable">
                        <thead>
                            <tr>
                                <th>Course Code</th>
                                <th>Course Name</th>
                                <th>Lecturer</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="enrolledTableBody">
                            <tr>
                                <td colspan="4" class="text-center py-4">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Available Courses -->
        <div class="fade-in" style="animation-delay: 0.2s;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3>Available Courses</h3>
                <button id="btnRegister" class="btn btn-primary" onclick="registerSelected()" disabled>
                    Register Selected (0)
                </button>
            </div>

            <div id="registrationAlert"></div>

            <div class="row g-4" id="availableCoursesGrid">
                <!-- Courses will be injected here -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // State
        let enrolledCourses = [];
        let allCourses = [];
        let selectedCourseIds = new Set();
        const MAX_COURSES = 5;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!Auth.requireStudent()) return;

            const user = Auth.getUser();
            document.getElementById('studentName').textContent = user.fullName;
            document.getElementById('studentEmail').textContent = user.email;
            document.getElementById('navUser').textContent = user.fullName;

            await loadData();
        });

        async function loadData() {
            try {
                // Fetch data
                const [enrolled, courses] = await Promise.all([
                    Api.getMyCourses(),
                    Api.getCourses()
                ]);

                if (enrolled.success) enrolledCourses = enrolled.data || [];
                if (courses.success) allCourses = courses.data || [];

                renderEnrolled();
                renderAvailable();
                updateStats();

            } catch (error) {
                console.error(error);
                UI.showToast('Failed to load courses', 'error');
            }
        }

        function renderEnrolled() {
            const tbody = document.getElementById('enrolledTableBody');

            if (enrolledCourses.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-muted">You have not registered for any courses yet.</td></tr>';
                return;
            }

            tbody.innerHTML = enrolledCourses.map(course => `
                <tr>
                    <td><span class="fw-bold text-primary">${course.courseCode}</span></td>
                    <td>${course.courseName}</td>
                    <td>${course.lecturerName || 'TBA'}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-danger" onclick="dropCourse(${course.courseID})">
                            Drop
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function renderAvailable() {
            const grid = document.getElementById('availableCoursesGrid');
            const enrolledIds = new Set(enrolledCourses.map(c => c.courseID));

            // Filter out enrolled courses
            const available = allCourses.filter(c => !enrolledIds.has(c.courseID));

            if (available.length === 0) {
                grid.innerHTML = '<div class="col-12 text-center text-muted py-5">No available courses to register.</div>';
                return;
            }

            grid.innerHTML = available.map(course => {
                const isSelected = selectedCourseIds.has(course.courseID);
                const isFull = course.enrolledCount >= course.maxCapacity;

                return `
                <div class="col-md-4 mb-3">
                    <div class="glass-card h-100 course-select-card ${isSelected ? 'border-primary' : ''} ${isFull ? 'opacity-75' : ''}" 
                         style="cursor: ${isFull ? 'not-allowed' : 'pointer'}"
                         onclick="toggleSelection(${course.courseID}, ${isFull})">
                        <div class="p-3">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="mb-0 text-truncate">${course.courseName}</h5>
                                ${isSelected ? '✅' : ''}
                            </div>
                            <span class="badge bg-secondary mb-3">${course.courseCode}</span>
                            <p class="small text-secondary mb-3 description-truncate">${course.description || 'No description available.'}</p>
                            
                            <div class="d-flex justify-content-between align-items-center small">
                                <span>👨‍🏫 ${course.lecturerName || 'TBA'}</span>
                            </div>

                            <div class="mt-3">
                                <div class="d-flex justify-content-between small mb-1">
                                    <span>Capacity</span>
                                    <span>${course.enrolledCount} / ${course.maxCapacity}</span>
                                </div>
                                <div class="progress" style="height: 6px;">
                                    <div class="progress-bar ${isFull ? 'bg-danger' : 'bg-success'}" 
                                         role="progressbar" 
                                         style="width: ${(course.enrolledCount / course.maxCapacity) * 100}%"></div>
                                </div>
                                ${isFull ? '<div class="text-danger small mt-1 fw-bold">Full</div>' : ''}
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function toggleSelection(courseId, isFull) {
            if (isFull) {
                UI.showToast('Course is full', 'error');
                return;
            }

            if (selectedCourseIds.has(courseId)) {
                selectedCourseIds.delete(courseId);
            } else {
                // Check limit
                if (enrolledCourses.length + selectedCourseIds.size >= MAX_COURSES) {
                    UI.showToast(`You cannot register for more than ${MAX_COURSES} courses.`, 'error');
                    return;
                }
                selectedCourseIds.add(courseId);
            }

            renderAvailable(); // Re-render to update UI (borders/checks)
            updateRegisterButton();
        }

        function updateRegisterButton() {
            const btn = document.getElementById('btnRegister');
            btn.disabled = selectedCourseIds.size === 0;
            btn.textContent = `Register Selected (${selectedCourseIds.size})`;
        }

        function updateStats() {
            const count = enrolledCourses.length;
            document.getElementById('enrolledCount').textContent = count;
            document.getElementById('creditsCount').textContent = count * 3; // Assuming 3 credits per course
            document.getElementById('slotsRemaining').textContent = Math.max(0, MAX_COURSES - count);
        }

        async function registerSelected() {
            if (selectedCourseIds.size === 0) return;

            const courseIds = Array.from(selectedCourseIds);

            UI.setLoading('btnRegister', true);
            try {
                const response = await Api.enrollCourses(courseIds);
                if (response.success) {
                    UI.showToast('Registration successful!', 'success');
                    selectedCourseIds.clear();
                    updateRegisterButton();
                    await loadData(); // Reload all data
                } else {
                    UI.showToast(response.message || 'Registration failed', 'error');
                }
            } catch (error) {
                UI.showToast(error.data?.message || 'Error processing registration', 'error');
            } finally {
                UI.setLoading('btnRegister', false);
            }
        }

        async function dropCourse(courseId) {
            if (!confirm('Are you sure you want to drop this course?')) return;

            try {
                const response = await Api.dropCourse(courseId);
                if (response.success) {
                    UI.showToast('Course dropped successfully', 'success');
                    await loadData();
                } else {
                    UI.showToast(response.message || 'Failed to drop course', 'error');
                }
            } catch (error) {
                UI.showToast('Error dropping course', 'error');
            }
        }
    </script>
    <style>
        .avatar-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .description-truncate {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</body>

</html>
